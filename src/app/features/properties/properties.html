<section class="properties">
  <h2 class="section-title">Imóveis em Destaque</h2>
  <div class="divider"></div>

  <div class="properties-list">
    @for (item of properties; track $index) {
      <div class="property-card">
        <div class="image">
          <img [src]="item.image" [alt]="item.title" />
        </div>

        <div class="info">
          <div class="propertie-info">
            <h3>{{ item.title }}</h3>
            <p class="location">{{ item.location }}</p>
            <span class="price">{{ item.price }}</span>
          </div>
          <div class="propertie-contact">
            <i class="fa-brands fa-whatsapp wpp-icon"></i>
            <i class="fa-solid fa-share share-icon"></i>
          </div>
        </div>
      </div>
    }
  </div>
</section>
