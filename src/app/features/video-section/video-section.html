<section class="video-section">
  <h2 class="section-title">Conheça mais sobre meu trabalho</h2>
  <div class="divider"></div>

  <div class="video-wrapper">
    <iframe
      [src]="videoUrl"
      title="YouTube Shorts"
      frameborder="0"
      allow="
        accelerometer;
        autoplay;
        clipboard-write;
        encrypted-media;
        gyroscope;
        picture-in-picture;
        web-share;
      "
      allowfullscreen
    >
    </iframe>
  </div>

  <p class="description">Entenda como posso te ajudar a encontrar o imóvel ideal.</p>
</section>
